<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do List</title>
</head>
<body>

    <button id="lgn">Log in with Google</button>

    <div class="todo-card">
        <h1>To Do List</h1>

      
        <div class="input-area">
            <input type="text" placeholder="Add a new task">
            <button type="button">Add</button>
        </div>

       
        <ul>
            <li>
                <label>
                    <input type="checkbox">
                    <span>complete this project</span>
                </label>
                <button class="del-btn">delete</button>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>play with my cat</span>
                </label>
                <button class="del-btn">delete</button>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>Finish homework</span>
                </label>
                <button class="del-btn">delete</button>
            </li>
        </ul>
    </div>
    <script src="app.js"></script>

</body>
</html>
