<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>To-Do List | Persistent & Smart Storage</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- GLOBAL RESET & BASE (DARK MODE DEFAULT) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background-color: #0C0D12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            transition: background-color 0.25s ease;
        }

        .app-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        /* ----- HEADER CARD ----- */
        .todo-card {
            background-color: #10131A;
            border-radius: 24px;
            color: #FFFFFF;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .todo-card .header-icon {
            font-size: 2rem;
            color: #4CAF50;
        }

        .todo-card h1 {
            font-weight: 700;
            font-size: 1.7rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFFFFF 0%, #B9B9C3 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0;
            padding-left: 4px;
        }

        .todo-card .right-icons {
            margin-left: auto;
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .todo-card .right-icons i {
            font-size: 1.5rem;
            cursor: pointer;
            color: #B0B3C0;
            transition: all 0.2s ease;
        }

        .todo-card .right-icons i:hover {
            color: #4CAF50;
            transform: scale(1.05);
        }

        /* ----- MAIN TASK PANEL ----- */
        .todo-list {
            background-color: #10131A;
            border-radius: 28px;
            color: #FFFFFF;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .todo-list h2 {
            font-size: 1.65rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .todo-list h2 i {
            font-size: 1.6rem;
            color: #4CAF50;
        }

        /* Input + date area */
        .input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-input-wrapper {
            flex: 2;
            min-width: 160px;
        }

        .task-input-wrapper input {
            width: 100%;
            background-color: #1A1C24;
            color: #F0F0F0;
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid #2C2F38;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .task-input-wrapper input:focus {
            outline: none;
            border-color: #4CAF50;
            background-color: #20222c;
        }

        .date-input-wrapper {
            flex: 1;
            min-width: 140px;
        }

        .date-input-wrapper input {
            width: 100%;
            background-color: #1A1C24;
            color: #F0F0F0;
            padding: 12px 12px;
            border-radius: 18px;
            border: 1px solid #2C2F38;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .date-input-wrapper input::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
            cursor: pointer;
        }

        .input-area button {
            background-color: #4CAF50;
            color: white;
            font-weight: 600;
            padding: 0 26px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .input-area button:hover {
            background-color: #3e9b42;
            transform: scale(0.97);
        }

        /* Filter buttons */
        .filter-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 24px 0;
        }

        .filter-btn {
            background-color: #1A1C24;
            color: #DDDEE4;
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn i {
            font-size: 0.8rem;
        }

        .filter-btn.active {
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .filter-btn:hover:not(.active) {
            background-color: #2c2f3a;
            color: white;
        }

        /* Task list items */
        .task-list-container {
            margin-top: 8px;
        }

        .task-items {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background-color: #1A1C24;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            border: 1px solid #2A2D36;
        }

        .task-item:hover {
            background-color: #21242e;
            border-color: #4CAF5040;
        }

        .task-check {
            transform: scale(1.2);
            accent-color: #4CAF50;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-text {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: -0.2px;
            word-break: break-word;
        }

        .task-date {
            font-size: 0.7rem;
            color: #9aa0b5;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-date i {
            font-size: 0.65rem;
            color: #7e849c;
        }

        .completed-task .task-text {
            text-decoration: line-through;
            color: #7c7f92;
        }

        .delete-task-btn {
            background: none;
            border: none;
            color: #afb4c9;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 40px;
            transition: 0.2s;
            width: 34px;
            display: flex;
            justify-content: center;
        }

        .delete-task-btn:hover {
            background-color: #ff4d4d20;
            color: #ff6b6b;
            transform: scale(1.05);
        }

        /* Progress footer + clear completed button */
        .progress-footer {
            margin-top: 28px;
            padding-top: 14px;
            border-top: 1px solid #262a34;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .progress-text {
            background: #0E0F16;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .footer-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .clear-completed-btn {
            background: #2C2F3A;
            border: none;
            color: #FFB4A2;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-completed-btn:hover {
            background: #ff4d4d30;
            color: #ff8a7a;
            transform: scale(0.96);
        }

        .storage-note {
            font-size: 0.7rem;
            opacity: 0.65;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c7085;
            background: #15181f;
            border-radius: 28px;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* ----- LIGHT MODE OVERRIDES (PERSISTENT) ----- */
        body.light-mode {
            background-color: #EFF2F7;
        }
        body.light-mode .todo-card,
        body.light-mode .todo-list {
            background-color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #E9ECF0;
            color: #1F2329;
        }
        body.light-mode .todo-card h1 {
            background: linear-gradient(135deg, #1F2A3A 0%, #4A5568 100%);
            background-clip: text;
            -webkit-background-clip: text;
        }
        body.light-mode .task-input-wrapper input,
        body.light-mode .date-input-wrapper input,
        body.light-mode .filter-btn,
        body.light-mode .task-item {
            background-color: #F8F9FC;
            color: #1E293B;
            border-color: #E2E8F0;
        }
        body.light-mode .task-input-wrapper input:focus {
            border-color: #4CAF50;
            background-color: #FFFFFF;
        }
        body.light-mode .filter-btn:hover:not(.active) {
            background-color: #E9EEF5;
            color: #0F172A;
        }
        body.light-mode .task-date {
            color: #5B6E8C;
        }
        body.light-mode .progress-text {
            background: #F1F5F9;
            color: #1E293B;
        }
        body.light-mode .clear-completed-btn {
            background: #EFF3F8;
            color: #c2410c;
        }
        body.light-mode .storage-note {
            color: #4b5563;
        }
        body.light-mode .date-input-wrapper input::-webkit-calendar-picker-indicator {
            filter: invert(0.2);
        }

        @media (max-width: 550px) {
            .todo-list {
                padding: 1.2rem;
            }
            .input-area {
                flex-direction: column;
            }
            .input-area button {
                justify-content: center;
                padding: 12px;
            }
            .filter-area {
                justify-content: center;
            }
            .task-item {
                flex-wrap: wrap;
            }
            .delete-task-btn {
                margin-left: auto;
            }
            .progress-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div class="todo-card">
        <i class="fas fa-check-circle header-icon"></i>
        <h1>To Do List</h1>
        <div class="right-icons">
            <i class="fas fa-moon" id="themeIcon" title="Switch theme (saved)"></i>
            <i class="fas fa-database" id="storageInfoIcon" title="Permanent local storage"></i>
        </div>
    </div>

    <!-- Main To-Do List Panel -->
    <div class="todo-list">
        <h2><i class="fas fa-list-check"></i> My Tasks</h2>

        <!-- Add new task area -->
        <div class="input-area">
            <div class="task-input-wrapper">
                <input type="text" id="newTaskInput" placeholder="Write a task... (e.g., 'Read book')" autocomplete="off">
            </div>
            <div class="date-input-wrapper">
                <input type="date" id="newTaskDate" value="">
            </div>
            <button id="addTaskBtn"><i class="fas fa-plus"></i> Add Task</button>
        </div>

        <!-- Filter buttons -->
        <div class="filter-area" id="filterArea">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-tasks"></i> All <span id="allCount">(0)</span></button>
            <button class="filter-btn" data-filter="pending"><i class="fas fa-hourglass-half"></i> Pending <span id="pendingCount">(0)</span></button>
            <button class="filter-btn" data-filter="completed"><i class="fas fa-check-circle"></i> Completed <span id="completedCount">(0)</span></button>
        </div>

        <!-- Task list container -->
        <div class="task-list-container">
            <ul class="task-items" id="taskListUl">
                <!-- dynamic tasks injected -->
            </ul>
        </div>

        <!-- Progress footer with clear completed & storage info -->
        <div class="progress-footer">
            <div class="progress-text" id="progressText">
                <i class="fas fa-chart-simple"></i> 0 of 0 completed
            </div>
            <div class="footer-actions">
                <button id="clearCompletedBtn" class="clear-completed-btn" title="Remove all completed tasks permanently">
                    <i class="fas fa-eraser"></i> Clear completed
                </button>
                <div class="storage-note" id="storageNote">
                    <i class="fas fa-cloud-upload-alt"></i> auto-saved
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================= PERSISTENT LOCAL STORAGE (LONG TERM) =======================
    // 1. Load tasks or initialize default dataset (with validation)
    // 2. Save on every modification (add, toggle, delete, clear completed)
    // 3. Theme persistence + graceful error handling (quota, parse errors)
    
    const STORAGE_TASKS_KEY = "smartTodo_tasks_v2";
    const STORAGE_THEME_KEY = "smartTodo_theme";

    // Helper: load tasks with fallback & data integrity check
    function loadTasksFromStorage() {
        let rawTasks = localStorage.getItem(STORAGE_TASKS_KEY);
        let parsedTasks = null;
        if (rawTasks) {
            try {
                parsedTasks = JSON.parse(rawTasks);
            } catch (e) {
                console.warn("Tasks JSON parse failed, using defaults");
                parsedTasks = null;
            }
        }
        
        // Default initial tasks (matches image requirement: 1 completed + pending with dates)
        const defaultTasks = [
            { id: 1001, text: "Buy groceries", completed: false, dueDateISO: "2024-05-25" },
            { id: 1002, text: "Finish project report", completed: false, dueDateISO: "2024-05-26" },
            { id: 1003, text: "Call John", completed: false, dueDateISO: "2024-05-27" },
            { id: 1004, text: "Morning workout", completed: true, dueDateISO: "2024-05-24" }
        ];
        
        let tasksArray = (parsedTasks && Array.isArray(parsedTasks)) ? parsedTasks : defaultTasks;
        
        // Data integrity: ensure each task has required fields and correct types
        tasksArray = tasksArray.map(task => {
            return {
                id: (typeof task.id === 'number' && !isNaN(task.id)) ? task.id : Date.now() + Math.random() * 10000,
                text: task.text ? String(task.text).trim() : "Untitled task",
                completed: task.completed === true,
                dueDateISO: task.dueDateISO && /^\d{4}-\d{2}-\d{2}$/.test(task.dueDateISO) ? task.dueDateISO : new Date().toISOString().slice(0,10)
            };
        }).filter(task => task.text !== ""); // remove empty named tasks
        
        if (tasksArray.length === 0 && (!parsedTasks || parsedTasks.length === 0)) {
            tasksArray = defaultTasks;
        }
        return tasksArray;
    }

    let tasks = loadTasksFromStorage();
    let currentFilter = "all";   // 'all', 'pending', 'completed'

    // Save tasks to localStorage with error simulation (quota guard)
    function persistTasks() {
        try {
            localStorage.setItem(STORAGE_TASKS_KEY, JSON.stringify(tasks));
            updateStorageNote(true);
        } catch (e) {
            console.error("Storage quota exceeded or error:", e);
            updateStorageNote(false);
        }
    }

    function updateStorageNote(success = true) {
        const noteSpan = document.getElementById('storageNote');
        if (noteSpan) {
            if (success) {
                noteSpan.innerHTML = `<i class="fas fa-check-circle"></i> saved locally`;
                setTimeout(() => {
                    if (noteSpan.innerHTML.includes("saved locally"))
                        noteSpan.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> auto-saved`;
                }, 1800);
            } else {
                noteSpan.innerHTML = `<i class="fas fa-exclamation-triangle"></i> storage error`;
                setTimeout(() => {
                    if (noteSpan.innerHTML.includes("error"))
                        noteSpan.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> auto-saved`;
                }, 2500);
            }
        }
    }

    // Helper: format date to "Month DD, YYYY"
    function formatDateToReadable(isoString) {
        if (!isoString) return "No date";
        const date = new Date(isoString);
        if (isNaN(date.getTime())) return "Set date";
        return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // update all counters (All, Pending, Completed)
    function updateCountersUI() {
        const total = tasks.length;
        const pendingTasks = tasks.filter(t => !t.completed).length;
        const completedTasks = tasks.filter(t => t.completed).length;
        document.getElementById('allCount').innerText = `(${total})`;
        document.getElementById('pendingCount').innerText = `(${pendingTasks})`;
        document.getElementById('completedCount').innerText = `(${completedTasks})`;
        const progressSpan = document.getElementById('progressText');
        progressSpan.innerHTML = `<i class="fas fa-chart-simple"></i> ${completedTasks} of ${total} task${total !== 1 ? 's' : ''} completed`;
    }

    function getFilteredTasks() {
        if (currentFilter === 'all') return [...tasks];
        if (currentFilter === 'pending') return tasks.filter(t => !t.completed);
        if (currentFilter === 'completed') return tasks.filter(t => t.completed);
        return tasks;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderTaskList() {
        const filtered = getFilteredTasks();
        const taskContainer = document.getElementById('taskListUl');
        if (filtered.length === 0) {
            taskContainer.innerHTML = `<div class="empty-state"><i class="far fa-smile-wink"></i><p>✨ No tasks here<br>Add a new task or switch filter ✨</p></div>`;
            return;
        }
        let listHtml = '';
        filtered.forEach(task => {
            const formattedDate = formatDateToReadable(task.dueDateISO);
            const checkedAttr = task.completed ? 'checked' : '';
            const completedClass = task.completed ? 'completed-task' : '';
            listHtml += `
                <li class="task-item" data-task-id="${task.id}">
                    <input type="checkbox" class="task-check" ${checkedAttr} data-id="${task.id}">
                    <div class="task-info ${completedClass}">
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <div class="task-date">
                            <i class="far fa-calendar-alt"></i> ${escapeHtml(formattedDate)}
                        </div>
                    </div>
                    <button class="delete-task-btn" data-id="${task.id}" title="Delete permanently"><i class="fas fa-trash-alt"></i></button>
                </li>
            `;
        });
        taskContainer.innerHTML = listHtml;
    }

    function highlightActiveFilter() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            const filterValue = btn.getAttribute('data-filter');
            if (filterValue === currentFilter) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function refreshUI() {
        updateCountersUI();
        renderTaskList();
        highlightActiveFilter();
    }

    // Add new task with date validation
    function addNewTask() {
        const taskInput = document.getElementById('newTaskInput');
        const taskDateInput = document.getElementById('newTaskDate');
        let taskText = taskInput.value.trim();
        if (taskText === "") {
            taskInput.style.border = "1px solid #ff6b6b";
            setTimeout(() => { taskInput.style.border = ""; }, 800);
            return;
        }
        
        let dueDateISO = taskDateInput.value;
        if (!dueDateISO) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            dueDateISO = `${yyyy}-${mm}-${dd}`;
        }
        
        const newId = Date.now() + Math.floor(Math.random() * 10000);
        const newTask = {
            id: newId,
            text: taskText,
            completed: false,
            dueDateISO: dueDateISO
        };
        tasks.push(newTask);
        persistTasks();     // immediate save
        taskInput.value = "";
        taskDateInput.value = "";
        refreshUI();
        
        const addBtn = document.getElementById('addTaskBtn');
        addBtn.style.transform = 'scale(0.96)';
        setTimeout(() => { addBtn.style.transform = ''; }, 150);
    }
    
    function toggleTaskCompletion(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            task.completed = !task.completed;
            persistTasks();
            refreshUI();
        }
    }
    
    function deleteTaskById(taskId) {
        tasks = tasks.filter(t => t.id !== taskId);
        persistTasks();
        refreshUI();
    }
    
    // Clear all completed tasks (permanent)
    function clearCompletedTasks() {
        const hadCompleted = tasks.some(t => t.completed === true);
        if (!hadCompleted) {
            const note = document.getElementById('storageNote');
            if (note) {
                note.innerHTML = `<i class="fas fa-info-circle"></i> no completed tasks`;
                setTimeout(() => {
                    if (note.innerHTML.includes("no completed")) note.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> auto-saved`;
                }, 1500);
            }
            return;
        }
        tasks = tasks.filter(t => !t.completed);
        persistTasks();
        refreshUI();
        // visual feedback
        const clearBtn = document.getElementById('clearCompletedBtn');
        clearBtn.style.transform = 'scale(0.95)';
        setTimeout(() => { clearBtn.style.transform = ''; }, 150);
        updateStorageNote(true);
    }
    
    // Event delegation for dynamic tasks
    function attachGlobalEvents() {
        const taskListContainer = document.getElementById('taskListUl');
        taskListContainer.addEventListener('change', (e) => {
            if (e.target && e.target.classList.contains('task-check')) {
                const taskId = parseInt(e.target.getAttribute('data-id'));
                if (!isNaN(taskId)) toggleTaskCompletion(taskId);
                e.stopPropagation();
            }
        });
        taskListContainer.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.delete-task-btn');
            if (deleteBtn) {
                const taskId = parseInt(deleteBtn.getAttribute('data-id'));
                if (!isNaN(taskId)) deleteTaskById(taskId);
                e.preventDefault();
            }
        });
    }
    
    function initFilterButtons() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filterValue = btn.getAttribute('data-filter');
                if (filterValue) {
                    currentFilter = filterValue;
                    refreshUI();
                }
            });
        });
    }
    
    // Theme: persistent with local storage and smooth toggle
    function initThemeSystem() {
        const themeIcon = document.getElementById('themeIcon');
        const savedTheme = localStorage.getItem(STORAGE_THEME_KEY);
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        } else {
            document.body.classList.remove('light-mode');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        }
        
        themeIcon.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light-mode');
            if (isLight) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem(STORAGE_THEME_KEY, 'light');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem(STORAGE_THEME_KEY, 'dark');
            }
            themeIcon.style.transform = 'rotate(20deg)';
            setTimeout(() => { if(themeIcon) themeIcon.style.transform = ''; }, 200);
        });
        
        // extra storage info icon hint
        const storageIcon = document.getElementById('storageInfoIcon');
        if (storageIcon) {
            storageIcon.addEventListener('click', () => {
                alert("✓ All tasks are automatically saved in your browser's local storage.\n✓ Data persists even after closing the browser.\n✓ 'Clear completed' removes finished tasks permanently.");
            });
        }
    }
    
    function bindAddTaskButton() {
        const addBtn = document.getElementById('addTaskBtn');
        const taskInput = document.getElementById('newTaskInput');
        addBtn.addEventListener('click', addNewTask);
        taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
        const dateInput = document.getElementById('newTaskDate');
        dateInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
    }
    
    // clear completed button handler
    function initClearCompleted() {
        const clearBtn = document.getElementById('clearCompletedBtn');
        if (clearBtn) clearBtn.addEventListener('click', clearCompletedTasks);
    }
    
    // re-validate integrity each startup but save after integrity fix
    function finalDataIntegrityAndSave() {
        // ensure no duplicate IDs, fix if any (rare)
        const ids = new Set();
        tasks = tasks.filter(task => {
            if (ids.has(task.id)) {
                task.id = Date.now() + Math.random() * 10000;
            }
            ids.add(task.id);
            return true;
        });
        persistTasks();  // write clean version back to storage
        refreshUI();
    }
    
    function initApp() {
        bindAddTaskButton();
        initFilterButtons();
        attachGlobalEvents();
        initThemeSystem();
        initClearCompleted();
        finalDataIntegrityAndSave();   // ensures stored version matches structure
        // small visual: update note on success
        updateStorageNote(true);
    }
    
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
